<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Fitness Passion Gym</title>
    <link rel="stylesheet" href="style.css?v=21">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-top: 50px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 4px;
            height: 400px;
            border: 1px solid var(--glass-border);
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            filter: grayscale(80%);
        }
        .gallery-item:hover img, .gallery-item:hover video {
            transform: scale(1.1);
            filter: grayscale(0%);
        }
        .gallery-overlay h3 { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 10px 20px; font-family: 'Oswald', sans-serif; text-transform: uppercase; font-size: 1.2rem; }
    </style>
    <link rel="icon" type="image/png" href="images/logo_gym_transparent.png">
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="section-padding" style="margin-top: 80px;">
        <div class="container text-center">
            <span class="section-subtitle" style="justify-content: center;">Raw Authenticity</span>
            <h1 class="section-title">THE <span>FACILITY</span></h1>
            
            <div class="gallery-grid">
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (2).jpg" alt="Gym Exterior">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">GYM EXTERIOR</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/raw_map_13.jpg" alt="Main Training Floor">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">TRAINING FLOOR</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/raw_map_14.jpg" alt="Trainers on the Gym Floor">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">TRAINING IN PROGRESS</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/gym_photo_1.jpg" alt="Gym Floor Wide View">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">GYM FLOOR</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed.jpg" alt="Squat Rack">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">SQUAT RACK</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (3).jpg" alt="Functional Training Rig">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">FUNCTIONAL RIG</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (8).jpg" alt="Deadlift Zone">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">DEADLIFT ZONE</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (1).jpg" alt="Machine Arsenal">

                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (4).jpg" alt="Treadmills - Cardio Zone">

                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">CARDIO ZONE</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (5).jpg" alt="Cardio Machines">

                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (7).jpg" alt="Changing Rooms">
                    <div class="gallery-overlay">
                        <span style="color: white; font-weight: bold; font-family: 'Oswald', sans-serif; font-size: 1.2rem; transform: skew(-5deg);">CHANGING ROOMS</span>
                    </div>
                </div>
                <div class="gallery-item fade-up">
                    <img src="images/gmaps_all/unnamed (9).jpg" alt="Hydration Station">

            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <button id="scroll-to-top" title="Return to Top"><i>↑</i></button>
    <script src="script.js"></script>
</body>
</html>
